<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Identidad / SEO -->
    <title>Liga Mendocina de Ajedrez</title>
    <meta
      name="description"
      content="Liga Mendocina de Ajedrez. Sitio oficial con ranking provincial, torneos, clubes afiliados, noticias y toda la actividad ajedrecística de Mendoza."
    />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Favicon / iconos (logo oficial de la Liga) -->
    <link rel="icon" type="image/svg+xml" href="/images/lma-logo.svg" />
    <link rel="icon" type="image/png" sizes="any" href="/images/image.png" />
    <link rel="shortcut icon" href="/images/lma-logo.svg" />
    <link rel="apple-touch-icon" href="/images/image.png" />

    <!-- Open Graph (WhatsApp, Facebook, LinkedIn, Telegram, Discord) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Liga Mendocina de Ajedrez" />
    <meta property="og:title" content="Liga Mendocina de Ajedrez" />
    <meta
      property="og:description"
      content="Liga Mendocina de Ajedrez. Ranking oficial, torneos, clubes y noticias del ajedrez mendocino."
    />
    <!-- Para que la preview funcione en WhatsApp/Discord, cambiá esta ruta a una URL
         ABSOLUTA cuando tengas el dominio (ej: https://tu-dominio.org/images/image.png)
         y agregá <meta property="og:url" content="https://tu-dominio.org" />. -->
    <meta property="og:image" content="/images/image.png" />
    <meta property="og:image:width" content="482" />
    <meta property="og:image:height" content="509" />
    <meta property="og:image:alt" content="Escudo de la Liga Mendocina de Ajedrez" />
    <meta property="og:locale" content="es_AR" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Liga Mendocina de Ajedrez" />
    <meta
      name="twitter:description"
      content="Liga Mendocina de Ajedrez. Ranking oficial, torneos, clubes y noticias del ajedrez mendocino."
    />
    <meta name="twitter:image" content="/images/image.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
